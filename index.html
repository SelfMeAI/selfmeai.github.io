<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELFME - Terminal Agent CLI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="site-switch" aria-label="Site switch">
        <span class="site-switch-link is-active">SELFME</span>
        <a class="site-switch-link" href="./unstable-ui/">Unstable UI</a>
    </nav>
    <div class="container">
        <div class="logo-wrapper">
            <img src="logo.jpg" alt="SELFME Logo" class="logo">
        </div>
        <h1 class="brand-name">SELFME</h1>
        <p class="tagline">Terminal Agent CLI</p>
        <p class="status-line">For real work in your workspace.</p>
        <div class="actions">
            <div class="install-card">
                <p class="install-label">Install from npm</p>
                <div class="install-row">
                    <code id="install-command">npm i -g selfme</code>
                    <button class="copy-button" type="button" data-copy-target="install-command" aria-label="Copy install command" title="Copy install command">
                        <svg class="copy-icon copy-icon-default" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M9 9.75A2.25 2.25 0 0 1 11.25 7.5h7.5A2.25 2.25 0 0 1 21 9.75v7.5a2.25 2.25 0 0 1-2.25 2.25h-7.5A2.25 2.25 0 0 1 9 17.25z"></path>
                            <path d="M15 6H8.25A2.25 2.25 0 0 0 6 8.25V15m3-7.5v9.75A2.25 2.25 0 0 0 11.25 19.5H21"></path>
                        </svg>
                        <svg class="copy-icon copy-icon-success" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M5 12.5l4.25 4.25L19 7"></path>
                        </svg>
                        <span class="copy-button-text">Copy</span>
                    </button>
                </div>
            </div>
            <div class="link-group">
                <a class="secondary-link" href="https://github.com/SelfMeAI/SelfMe" target="_blank" rel="noreferrer">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 .5a12 12 0 0 0-3.79 23.39c.6.12.82-.26.82-.58l-.02-2.04c-3.34.73-4.04-1.41-4.04-1.41-.54-1.4-1.33-1.77-1.33-1.77-1.09-.77.08-.75.08-.75 1.2.09 1.84 1.25 1.84 1.25 1.08 1.87 2.82 1.33 3.5 1.02.11-.8.42-1.33.77-1.64-2.67-.31-5.47-1.36-5.47-6.03 0-1.33.46-2.42 1.22-3.27-.12-.31-.53-1.56.12-3.24 0 0 1-.33 3.3 1.25a11.3 11.3 0 0 1 6 0c2.29-1.58 3.29-1.25 3.29-1.25.66 1.68.25 2.93.12 3.24.76.85 1.22 1.94 1.22 3.27 0 4.68-2.8 5.72-5.48 6.02.43.38.82 1.12.82 2.26l-.01 3.35c0 .32.22.7.83.58A12 12 0 0 0 12 .5Z"></path>
                    </svg>
                    <span>View on GitHub</span>
                </a>
            </div>
        </div>
        <p class="status-line secondary-status">Actively developed for a stronger terminal-native agent experience.</p>
    </div>
    <script>
        const copyButton = document.querySelector('.copy-button');
        const commandNode = document.getElementById('install-command');

        if (copyButton && commandNode) {
            const labelNode = copyButton.querySelector('.copy-button-text');
            const setCopiedState = (copied) => {
                copyButton.classList.toggle('is-copied', copied);
                copyButton.setAttribute('aria-label', copied ? 'Copied' : 'Copy install command');
                copyButton.setAttribute('title', copied ? 'Copied' : 'Copy install command');
                if (labelNode) {
                    labelNode.textContent = copied ? 'Copied' : 'Copy';
                }
            };

            copyButton.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(commandNode.textContent.trim());
                    setCopiedState(true);
                    window.setTimeout(() => {
                        setCopiedState(false);
                    }, 1400);
                } catch {
                    setCopiedState(false);
                }
            });
        }
    </script>
</body>
</html>
